<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Teamcenter Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #eef1f6;
  --bg1: #ffffff;
  --bg2: #e4e9f2;
  --border: #cdd5e4;
  --border2: #b0bdd0;
  --text: #1a2638;
  --dim: #546070;
  --faint: #8898aa;
  --gold: #0d8fa8;
  --gold-bg: rgba(13,143,168,0.10);
  --green: #14a870;
  --green-bg: rgba(20,168,112,0.12);
  --red: #d94040;
  --red-bg: rgba(217,64,64,0.10);
  --yellow: #b8860a;
  --r: 10px;
  --rs: 7px;
  --serif: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
}
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
#root { max-width: 680px; margin: 0 auto; padding: 20px 16px 100px; }

/* ── TYPOGRAPHY ── */
h1 { font-family: var(--serif); font-size: clamp(26px,5vw,34px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }
h2 { font-family: var(--serif); font-size: clamp(18px,4vw,22px); font-weight: 700; line-height: 1.25; }
.label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); font-weight: 600; }
.gold { color: var(--gold); }
.italic { font-style: italic; }

/* ── CARD ── */
.card { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
.card + .card { margin-top: 10px; }

/* ── BUTTONS ── */
button { font-family: var(--sans); cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
button:active { transform: scale(0.98); opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px 18px; border-radius: var(--r); font-size: 15px; font-weight: 600; }
.btn-primary { background: var(--gold); color: #ffffff; }
.btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost { background: transparent; color: var(--gold); font-size: 14px; font-weight: 600; padding: 8px 0; width: auto; }
.btn-sm { padding: 10px 14px; font-size: 13px; border-radius: var(--rs); }

/* ── INPUTS ── */
input[type=text] {
  width: 100%; padding: 14px 16px; background: var(--bg2);
  border: 1.5px solid var(--border2); border-radius: var(--r);
  color: var(--text); font-family: var(--sans); font-size: 16px;
  outline: none; transition: border-color 0.2s;
}
input[type=text]:focus { border-color: var(--gold); }
input[type=text]::placeholder { color: var(--faint); }

/* ── PILL TABS ── */
.tabs { display: flex; background: var(--bg1); border: 1px solid var(--border); border-radius: var(--r); padding: 4px; gap: 4px; }
.tab { flex: 1; padding: 11px 10px; border-radius: var(--rs); font-size: 14px; font-weight: 600; color: var(--dim); background: transparent; }
.tab.active { background: var(--gold); color: #ffffff; }

/* ── SECTION LABEL ── */
.section-label { margin: 24px 0 10px; }

/* ── TOPIC LIST ── */
.topic-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  width: 100%; text-align: left; color: var(--text);
  margin-bottom: 8px;
}
.topic-item:hover { border-color: var(--border2); }
.topic-item.done { background: rgba(20,168,112,0.09); border-color: rgba(20,168,112,0.38); }
.topic-item.in-progress { background: rgba(200,158,0,0.07); border-color: rgba(200,158,0,0.35); }
.topic-num { font-family: var(--serif); font-size: 20px; color: var(--gold); font-weight: 700; min-width: 28px; }
.topic-body { flex: 1; min-width: 0; }
.topic-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
.topic-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); }
.topic-meta .ok { color: var(--green); }
.topic-meta .bad { color: var(--red); }
.topic-meta .faint { color: var(--faint); }
.topic-arrow { color: var(--faint); font-size: 18px; }

/* ── ASSESSMENT CARDS ── */
.assess-card {
  width: 100%; text-align: left; background: var(--bg1);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 18px; margin-bottom: 10px; color: var(--text);
}
.assess-card.featured { border-color: var(--gold); background: linear-gradient(135deg, var(--bg1) 60%, var(--gold-bg)); }
.assess-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.assess-card.featured .assess-title { color: var(--gold); }
.assess-sub { font-size: 13px; color: var(--dim); }

/* ── QUIZ ── */
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
.quiz-title-text { font-family: var(--serif); font-size: 17px; font-weight: 700; text-align: right; flex: 1; line-height: 1.3; }
.quiz-timer { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--gold); background: var(--gold-bg); border: 1px solid var(--gold); border-radius: 8px; padding: 4px 10px; white-space: nowrap; flex-shrink: 0; }
.quiz-timer.warn { color: var(--red); background: var(--red-bg); border-color: var(--red); }
.progress-bar { height: 3px; background: var(--bg2); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.3s; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 22px; }
.streak { color: var(--gold); }

.qcard { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 14px; }
.qnum { font-family: var(--mono); font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.qtext { font-family: var(--serif); font-size: clamp(17px,4vw,20px); line-height: 1.45; }
.multi-badge { margin-top: 10px; display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--yellow); background: rgba(232,201,109,0.12); padding: 4px 8px; border-radius: 6px; }

.options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
.opt {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--bg1); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 13px 15px;
  width: 100%; text-align: left; color: var(--text); font-size: 15px; line-height: 1.4;
}
.opt-letter {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--dim); margin-top: 1px;
}
.opt.sel { border-color: var(--gold); background: var(--gold-bg); }
.opt.sel .opt-letter { background: var(--gold); border-color: var(--gold); color: #ffffff; }
.opt.correct { border-color: var(--green); background: var(--green-bg); }
.opt.correct .opt-letter { background: var(--green); border-color: var(--green); color: #ffffff; }
.opt.wrong { border-color: var(--red); background: var(--red-bg); }
.opt.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #ffffff; }
.opt.locked { cursor: default; }
.opt.faded { opacity: 0.45; cursor: default; }

.feedback-box { border-left: 3px solid var(--border2); padding: 12px 14px; border-radius: var(--rs); margin-bottom: 12px; font-size: 14px; }
.feedback-box.ok { border-left-color: var(--green); }
.feedback-box.bad { border-left-color: var(--red); }
.fb-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 4px; }
.feedback-box.ok .fb-label { color: var(--green); }
.feedback-box.bad .fb-label { color: var(--red); }
.fb-body { color: var(--dim); line-height: 1.5; }
.fb-body strong { color: var(--text); }

.quiz-nav { display: flex; gap: 8px; margin-top: 6px; }
.quiz-nav .btn { flex: 1; }
.q-jump { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
.q-jump button { width: 34px; height: 34px; border-radius: 6px; font-size: 11px; font-weight: 700; border: 1.5px solid var(--border2); background: var(--bg2); color: var(--dim); cursor: pointer; flex-shrink: 0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1px; line-height:1; }
.q-jump button.qj-current { border-color: var(--gold); background: var(--gold); color: #fff; }
.q-jump button.qj-correct { border-color: var(--green); background: rgba(20,168,112,0.15); color: var(--green); }
.q-jump button.qj-wrong   { border-color: var(--red);   background: rgba(217,64,64,0.12);  color: var(--red); }
.q-jump .qj-mark { font-size: 9px; line-height: 1; }

/* ── RESULTS ── */
.results-hero { text-align: center; padding: 28px 16px 24px; background: var(--bg1); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 20px; }
.big-score { font-family: var(--serif); font-size: clamp(56px,12vw,72px); font-weight: 700; line-height: 1; color: var(--gold); }
.big-score .denom { font-size: 0.45em; color: var(--faint); }
.big-pct { font-size: 18px; font-weight: 600; margin-top: 6px; }
.big-pct.pass { color: var(--green); }
.big-pct.fail { color: var(--red); }

.result-row { background: var(--bg1); border: 1px solid var(--border); border-left: 3px solid var(--border2); border-radius: var(--rs); padding: 13px 15px; margin-bottom: 8px; }
.result-row.ok { border-left-color: var(--green); }
.result-row.bad { border-left-color: var(--red); }
.result-q { font-size: 13px; line-height: 1.4; margin-bottom: 6px; }
.result-ans { font-family: var(--mono); font-size: 11px; color: var(--dim); }
.result-ans .correct-ans { color: var(--green); }
.result-ans .wrong-ans { color: var(--red); text-decoration: line-through; }

/* ── USER HEADER BAR ── */
.user-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.user-greeting { font-size: 13px; color: var(--dim); }
.user-name-display { font-weight: 700; color: var(--text); }
.switch-user-btn { font-family: var(--mono); font-size: 11px; color: var(--faint); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; }

/* ── AUTH SCREEN ── */
.auth-wrap { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; padding: 20px 0; }
.auth-logo { font-size: 38px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.auth-sub { color: var(--dim); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
.auth-form { display: flex; flex-direction: column; gap: 12px; }
.auth-error { color: var(--red); font-size: 13px; padding: 10px 14px; background: var(--red-bg); border-radius: var(--rs); border-left: 3px solid var(--red); }
.auth-toggle { text-align: center; font-size: 14px; color: var(--dim); margin-top: 4px; }
.auth-toggle button { background: none; border: none; color: var(--gold); font-size: 14px; font-weight: 600; cursor: pointer; padding: 0; text-decoration: underline; }
.auth-loading { text-align: center; padding: 80px 20px; color: var(--dim); font-size: 15px; }

/* ── FEEDBACK BUTTON ── */
.fab { position: fixed; bottom: 20px; right: 20px; z-index: 999; background: var(--bg1); border: 1px solid var(--border2); border-radius: 20px; padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--dim); cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.10); transition: box-shadow 0.15s; }
.fab:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); color: var(--text); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--dim); margin-bottom: 18px; }
.modal-type { display: flex; gap: 8px; margin-bottom: 14px; }
.modal-type button { flex: 1; padding: 8px; border-radius: var(--rs); border: 1.5px solid var(--border2); background: var(--bg2); font-size: 13px; font-weight: 600; color: var(--dim); cursor: pointer; }
.modal-type button.active { border-color: var(--gold); background: var(--gold-bg); color: var(--gold); }
.modal-box textarea { width: 100%; box-sizing: border-box; min-height: 90px; resize: vertical; padding: 10px 12px; border: 1.5px solid var(--border2); border-radius: var(--rs); font-family: var(--sans); font-size: 14px; background: var(--bg2); color: var(--text); margin-bottom: 14px; }
.modal-box textarea:focus { outline: none; border-color: var(--gold); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.page { animation: fadeUp 0.22s ease-out; }

/* ── ACTION ROW ── */
.action-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.action-row button { flex: 1; min-width: 120px; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 40px 20px; color: var(--dim); }
.empty h3 { font-family: var(--serif); color: var(--text); margin-bottom: 8px; font-size: 20px; }
</style>
</head>

const STORE_KEY = 'tcprep_v3';

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveStore() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch(e) { console.warn('Save failed', e); }
  if (store.activeUser) pushToCloud(store.activeUser);
}

// Merge two user data objects — combine progress per topic.
//
// Conflict resolution is **timestamp-based** at the topic level: whichever side
// has a more recent `updatedAt` is the authoritative version for that topic.
// This is the only correct strategy because the local user's per-question state
// (correctIds vs wrongIds) is already maintained accurately by recordQuestionResult.
// Any content-only merge (correct-wins / wrong-wins) inevitably destroys data —
// "correct wins" silently reverts new wrong answers from stale cloud data;
// "wrong wins" silently reverts corrections.  Timestamps avoid both.
//
// Legacy fallback: when neither side has an `updatedAt` (data from before this
// fix), fall back to a union with correct-wins — a one-time gentle migration
// that also self-heals any stuck-wrong from the previous broken push.
function mergeUserData(local, cloud) {
  if (!local && !cloud) return { topicStats: {}, wrongIds: [] };
  if (!local) return cloud;
  if (!cloud) return local;

  const merged = { topicStats: {}, wrongIds: [] };

  const allTopics = new Set([
    ...Object.keys(local.topicStats || {}),
    ...Object.keys(cloud.topicStats || {})
  ]);
  allTopics.forEach(t => {
    const l = (local.topicStats || {})[t] || {};
    const c = (cloud.topicStats || {})[t] || {};
    const lTime = l.updatedAt || 0;
    const cTime = c.updatedAt || 0;
    const topic = TOPIC_BY_NAME[t];

    let chosen;
    if (lTime === 0 && cTime === 0) {
      // Legacy data on both sides — fall back to union with correct-wins.
      const correctIds = [...new Set([...(l.correctIds || []), ...(c.correctIds || [])])];
      const correctSet = new Set(correctIds);
      const wrongIds   = [...new Set([...(l.wrongIds || []), ...(c.wrongIds || [])])].filter(id => !correctSet.has(id));
      chosen = { ...l, correctIds, wrongIds };
    } else if (lTime >= cTime) {
      chosen = l;
    } else {
      chosen = c;
    }

    merged.topicStats[t] = {
      correctIds: chosen.correctIds || [],
      wrongIds:   chosen.wrongIds   || [],
      lastScore:  (chosen.correctIds || []).length,
      lastTotal:  topic ? topic.questions.length : (chosen.lastTotal || 0),
      updatedAt:  Math.max(lTime, cTime),
      ...(chosen.sessionAnswers  ? { sessionAnswers:  chosen.sessionAnswers  } : {}),
      ...(chosen.sessionRevealed ? { sessionRevealed: chosen.sessionRevealed } : {}),
      ...(chosen.resumeIndex != null ? { resumeIndex: chosen.resumeIndex } : {})
    };
  });

  // Rebuild top-level wrongIds from the already-merged per-topic stats.
  // Per-topic wrongIds are authoritative (correct-wins logic already applied above),
  // so aggregating them gives a more accurate result than trying to union two
  // potentially-stale top-level arrays.
  const allWrong = new Set();
  Object.values(merged.topicStats).forEach(ts => (ts.wrongIds || []).forEach(id => allWrong.add(id)));
  merged.wrongIds = [...allWrong];

  return merged;
}

// Push to cloud using a TRANSACTION so we never overwrite another device's data.
// The transaction reads current cloud state, merges with local, then writes atomically.
function pushToCloud(key) {
  const u = (store.users || {})[key];
  if (!u) return;
  const docRef = db.collection('progress').doc(key);
  db.runTransaction(async (transaction) => {
    const doc = await transaction.get(docRef);
    let cloudData = doc.exists
      ? { topicStats: doc.data().topicStats || {}, wrongIds: doc.data().wrongIds || [] }
      : null;
    if (cloudData) migrateTopicStats(cloudData);
    const localData = { topicStats: u.topicStats || {}, wrongIds: u.wrongIds || [] };
    migrateTopicStats(localData);
    const merged = mergeUserData(localData, cloudData);
    // Reflect the merged state back into local store so this device sees the union too
    if (store.users && store.users[key]) {
      store.users[key].topicStats = merged.topicStats;
      store.users[key].wrongIds   = merged.wrongIds;
      try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch {}
    }
    transaction.set(docRef, {
      topicStats: merged.topicStats,
      wrongIds:   merged.wrongIds,
      updatedAt:  Date.now()
    });
  }).catch(e => console.error('[pushToCloud] transaction failed:', e));
}

async function pullFromCloud(key) {
  // key is "name_pin" format. Also try legacy name-only keys so old profiles migrate.
  const namePart = key.includes('_') ? key.split('_').slice(0,-1).join('_') : key;
  const toTry = [...new Set([
    key,
    namePart,
    namePart.toUpperCase(),
    namePart.charAt(0).toUpperCase() + namePart.slice(1)
  ])];

  console.log('[pullFromCloud] trying keys:', toTry);
  try {
    let data = null, legacyKey = null;
    for (const k of toTry) {
      const doc = await db.collection('progress').doc(k).get();
      console.log('[pullFromCloud] key=' + k + ' exists=' + doc.exists);
      if (doc.exists) {
        data = doc.data();
        if (k !== key) legacyKey = k;
        break;
      }
    }
    if (data) {
      console.log('[pullFromCloud] got cloud data:', { topics: Object.keys(data.topicStats || {}).length, wrongIds: (data.wrongIds || []).length });
      if (!store.users) store.users = {};
      const cloudData = { topicStats: data.topicStats || {}, wrongIds: data.wrongIds || [] };
      migrateTopicStats(cloudData); // ensure cloud data has correctIds before merge
      const localData = store.users[key] || null;
      if (localData) migrateTopicStats(localData);
      store.users[key] = mergeUserData(localData, cloudData);
      console.log('[pullFromCloud] merged result topics:', Object.keys(store.users[key].topicStats || {}).length);
      try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch {}
      if (legacyKey) {
        db.collection('progress').doc(key).set({
          topicStats: data.topicStats || {},
          wrongIds:   data.wrongIds   || [],
          updatedAt:  Date.now()
        }).then(() => db.collection('progress').doc(legacyKey).delete())
          .catch(e => console.warn('Migration failed:', e));
      }
    }
  } catch(e) { console.error('[pullFromCloud] failed:', e); }
}

// Extract display name from "name_pin" key
function displayName(key) {
  if (!key) return '';
  return key.includes('_') ? key.split('_').slice(0,-1).join(' ') : key;
}

let store = loadStore();

// One-time local migration: lowercase all user keys in the store
(function migrateLocalKeys() {
  if (!store.users) return;
  let changed = false;
  Object.keys(store.users).forEach(key => {
    const lower = key.toLowerCase();
    if (lower !== key) {
      // merge into lowercase key (prefer whichever has more progress)
      const existing = store.users[lower];
      const legacy   = store.users[key];
      if (!existing) {
        store.users[lower] = legacy;
      } else {
        // keep the one with more wrongIds / topicStats entries
        const existingScore = Object.keys(existing.topicStats || {}).length;
        const legacyScore   = Object.keys(legacy.topicStats   || {}).length;
        if (legacyScore > existingScore) store.users[lower] = legacy;
      }
      delete store.users[key];
      changed = true;
    }
  });
  if (store.activeUser) store.activeUser = store.activeUser.toLowerCase();
  if (changed) try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch {}
})();

// Page-load sync runs later — moved below TOPICS/migrateTopicStats definitions.

function getUser(name) {
  if (!store.users) store.users = {};
  if (!store.users[name]) store.users[name] = { topicStats: {}, wrongIds: [] };
  return store.users[name];
}

function currentUser() {
  return store.activeUser ? getUser(store.activeUser) : null;
}

/* ════════════════════════════════════════════════
   TOPIC INDEX
   ════════════════════════════════════════════════ */
const TOPICS = (() => {
  const order = [], map = {};
  for (const q of QUESTIONS) {
    if (!map[q.t]) { map[q.t] = []; order.push(q.t); }
    map[q.t].push(q);
  }
  return order.map(name => ({ name, questions: map[name] }));
})();
// Lookup: topicName → topic object (for finding by q.t)
const TOPIC_BY_NAME = Object.fromEntries(TOPICS.map(t => [t.name, t]));

// Back-fill correctIds from lastScore/wrongIds for old data so existing progress
// remains visible after upgrade. If we know exactly which questions were right
// (full attempt), use those. Otherwise pick arbitrary non-wrong IDs to preserve
// the user's visible score — they'll be re-evaluated naturally if the user
// re-attempts those questions.
function migrateTopicStats(user) {
  if (!user || !user.topicStats) return;
  TOPICS.forEach(topic => {
    const stats = user.topicStats[topic.name];
    if (!stats || stats.correctIds) return;
    const wrongSet = new Set(stats.wrongIds || []);
    const available = topic.questions.filter(q => !wrongSet.has(q.i)).map(q => q.i);
    const score = stats.lastScore || 0;
    // Slice up to `score` IDs from non-wrong questions
    stats.correctIds = available.slice(0, Math.min(score, available.length));
  });
}

// Update topic stats when a question is answered. q has .i (id) and .t (topic name).
function recordQuestionResult(user, q, isCorrect) {
  user.topicStats = user.topicStats || {};
  const ts = user.topicStats[q.t] = user.topicStats[q.t] || { correctIds: [], wrongIds: [] };
  ts.correctIds = ts.correctIds || [];
  ts.wrongIds   = ts.wrongIds   || [];
  if (isCorrect) {
    if (!ts.correctIds.includes(q.i)) ts.correctIds = [...ts.correctIds, q.i];
    ts.wrongIds = ts.wrongIds.filter(id => id !== q.i);
  } else {
    if (!ts.wrongIds.includes(q.i)) ts.wrongIds = [...ts.wrongIds, q.i];
    ts.correctIds = ts.correctIds.filter(id => id !== q.i);
  }
  // Keep lastScore / lastTotal in sync as a snapshot
  const topic = TOPIC_BY_NAME[q.t];
  if (topic) {
    ts.lastScore = ts.correctIds.length;
    ts.lastTotal = topic.questions.length;
  }
  // Stamp the topic so the sync merge knows this side is the freshest version.
  ts.updatedAt = Date.now();
}

// On page load: pull from cloud, merge with local, push merged result back
// (Placed here so TOPICS / migrateTopicStats are already initialised.)
if (store.activeUser) {
  if (store.users && store.users[store.activeUser]) {
    migrateTopicStats(store.users[store.activeUser]);
  }
  pullFromCloud(store.activeUser).then(() => {
    if (store.users && store.users[store.activeUser]) {
      migrateTopicStats(store.users[store.activeUser]);
    }
    pushToCloud(store.activeUser);
    if (typeof render === 'function') render();
  });
}

// Aggregate all wrong IDs from per-topic stats — the authoritative source.
// Falls back to top-level wrongIds only if topicStats is empty (legacy data).
function getAllWrongIds(user) {
  const topicWrong = new Set();
  Object.values(user.topicStats || {}).forEach(ts => {
    (ts.wrongIds || []).forEach(id => topicWrong.add(id));
  });
  if (topicWrong.size > 0) return [...topicWrong];
  // Legacy fallback: use top-level array if no per-topic data exists yet
  return user.wrongIds || [];
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// Seeded shuffle — same seed always produces the same order
function seededShuffle(arr, seed) {
  const a = arr.slice();
  let s = seed >>> 0;
  for (let i = a.length - 1; i > 0; i--) {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function arrEq(a, b) {
  const sa = [...a].sort((x,y)=>x-y), sb = [...b].sort((x,y)=>x-y);
  return sa.length === sb.length && sa.every((v,i) => v === sb[i]);
}
function letter(i) { return String.fromCharCode(65 + i); }
function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Timer state
let quizTimerInterval = null;
function clearQuizTimer() {
  if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
}
function startQuizTimer(timerEl) {
  clearQuizTimer();
  quizTimerInterval = setInterval(() => {
    if (!quiz || !quiz.startTime) { clearQuizTimer(); return; }
    const elapsed = Math.floor((Date.now() - quiz.startTime) / 1000);
    const left = Math.max(0, quiz.timeLimit - elapsed);
    timerEl.textContent = '⏱ ' + formatTime(left);
    if (left <= 300) timerEl.classList.add('warn');   // red in last 5 min
    if (left === 0) { clearQuizTimer(); finishQuiz(); }
  }, 1000);
}

/* ════════════════════════════════════════════════
   MINI DOM HELPERS
   ════════════════════════════════════════════════ */
function el(tag, props, ...kids) {
  const e = document.createElement(tag);
  if (props) for (const [k, v] of Object.entries(props)) {
    if (v == null || v === false) continue;
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of kids.flat(Infinity)) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function div(cls, ...kids) { return el('div', { cls }, ...kids); }
function span(cls, txt) { return el('span', { cls }, txt); }
function btn(cls, text, onClick) { return el('button', { cls, onClick }, text); }

function openFeedback() {
  let type = 'bug';
  const overlay = el('div', { cls: 'modal-overlay' });

  const box = div('modal-box',
    el('div', { cls: 'modal-title' }, 'Report a bug or suggestion'),
    el('div', { cls: 'modal-sub' }, 'Your feedback goes directly to the creator.')
  );

  // Type toggle
  const typeRow = div('modal-type');
  const bugBtn  = el('button', { cls: 'active', onClick: () => { type = 'bug';         bugBtn.classList.add('active');  ideaBtn.classList.remove('active'); } }, '🐛 Bug');
  const ideaBtn = el('button', { cls: '',       onClick: () => { type = 'improvement'; ideaBtn.classList.add('active'); bugBtn.classList.remove('active');  } }, '💡 Improvement');
  typeRow.appendChild(bugBtn); typeRow.appendChild(ideaBtn);
  box.appendChild(typeRow);

  const ta = el('textarea', { placeholder: 'Describe the issue or idea…' });
  box.appendChild(ta);

  const status = el('div', { style: 'font-size:12px;color:var(--dim);margin-bottom:10px;display:none;' });
  box.appendChild(status);

  const footer = div('modal-footer',
    el('button', { cls: 'btn btn-secondary', style: 'flex:0 0 auto;', onClick: () => overlay.remove() }, 'Cancel'),
    el('button', { cls: 'btn btn-primary',   style: 'flex:0 0 auto;', onClick: async () => {
      const msg = ta.value.trim();
      if (!msg) { ta.focus(); return; }
      status.textContent = 'Sending…'; status.style.display = '';
      try {
        await db.collection('feedback').add({
          type, message: msg,
          user: store.activeUser || 'anonymous',
          createdAt: Date.now()
        });
        status.textContent = '✓ Sent — thank you!';
        ta.value = '';
        setTimeout(() => overlay.remove(), 1200);
      } catch(e) {
        status.textContent = 'Failed to send. Please try again.';
        console.warn('Feedback error:', e);
      }
    }}, 'Submit')
  );
  box.appendChild(footer);
  overlay.appendChild(box);

  // Close on backdrop click
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('root').appendChild(overlay);
  setTimeout(() => ta.focus(), 50);
}

  }

  // Mock Exams at the bottom
  w.appendChild(el('div', { style: 'margin-top:24px;margin-bottom:16px;padding:12px 14px;background:var(--gold-bg);border:1px solid var(--gold);border-radius:var(--rs);font-size:13px;color:var(--text);line-height:1.6;' },
    el('strong', null, '🎯 Heads up — '), 'The real Teamcenter Associate exam is AI proctored. Use these mock exams to simulate real exam conditions — no notes, no browser tabs, no help from others. The more honestly you practice, the better prepared you\'ll be on exam day.'
  ));
  w.appendChild(el('div', { cls: 'label section-label' }, 'Mock Exams'));
  w.appendChild(el('p', { style: 'font-size:13px;color:var(--dim);margin-bottom:12px;' }, '125 questions · 2 hour timer · Fixed sets that mirror the real exam.'));

  [1,2,3,4,5].forEach(n => {
    w.appendChild(el('button', {
      cls: 'assess-card',
      onClick: () => startQuiz({ mode: 'assessment', source: 'mock', mockSet: n })
    },
      el('div', { cls: 'assess-title' }, `Mock Exam ${n}`),
      el('div', { cls: 'assess-sub' }, `Set ${n} · 125 questions · 2 hrs`)
    ));
  });

  w.appendChild(el('div', { cls: 'label section-label', style: 'margin-top:28px' }, 'How assessment mode works'));
  w.appendChild(div('card',
    el('p', { style: 'font-size:14px;color:var(--dim);line-height:1.6' },
      'Answer all questions first — no feedback until the end. Then see your full score, every missed question, and jump straight into reviewing your mistakes.'
    )
  ));

  return w;
}

/* ════════════════════════════════════════════════
   START QUIZ
   ════════════════════════════════════════════════ */
function startQuiz(opts) {
  const user = currentUser();
  let pool = [], title = '';

  if (opts.source === 'topic') {
    const t = TOPICS[opts.topicIdx];
    pool = route.shuffle ? shuffle(t.questions.slice()) : t.questions.slice();
    title = t.name;
    // Resume from where the user left off (only works in non-shuffled mode)
    const stats = (user.topicStats || {})[t.name] || {};
    opts._resumeIndex   = (!route.shuffle && stats.resumeIndex > 0 && stats.resumeIndex < pool.length)
      ? stats.resumeIndex : 0;
    opts._preAnswers  = (!route.shuffle && stats.sessionAnswers)  ? stats.sessionAnswers  : {};
    opts._preRevealed = (!route.shuffle && stats.sessionRevealed) ? stats.sessionRevealed : {};
    // Recalculate correct count from restored answers
    let preCorrect = 0;
    Object.keys(opts._preRevealed).forEach(qiStr => {
      const qi = parseInt(qiStr);
      const pq = pool.find(p => p.i === qi);
      if (!pq) return;
      const sel = opts._preAnswers[qi] || [];
      const ca  = Array.isArray(pq.a) ? pq.a : [pq.a];
      if (arrEq(sel, ca)) preCorrect++;
    });
    opts._preCorrect = preCorrect;
  } else if (opts.source === 'wrong') {
    const ids = new Set(getAllWrongIds(user));
    pool = shuffle(QUESTIONS.filter(q => ids.has(q.i)));
    title = 'Review wrong answers';
  } else if (opts.source === 'full') {
    pool = shuffle(QUESTIONS.slice());
    title = 'Full Assessment';
  } else if (opts.source === 'mock') {
    // Seeded so each mock set is always the same 125 questions
    pool = seededShuffle(QUESTIONS.slice(), opts.mockSet * 999983).slice(0, 125);
    title = `Mock Exam ${opts.mockSet}`;
  } else if (opts.source === 'sample') {
    pool = shuffle(QUESTIONS.slice()).slice(0, opts.sampleSize);
    title = `${opts.sampleSize}-question assessment`;
  }

  if (!pool.length) return;

  const timeLimit = opts.source === 'mock' ? 7200 : null; // 2 hrs for mock only

  quiz = {
    mode: opts.mode, source: opts.source, topicIdx: opts.topicIdx,
    mockSet: opts.mockSet || null,
    title, pool, index: opts._resumeIndex || 0,
    answers:  { ...(opts._preAnswers  || {}) }, // restore previous answers
    revealed: { ...(opts._preRevealed || {}) }, // restore previous revealed state
    streak: 0, correctCount: opts._preCorrect || 0,
    timeLimit, startTime: timeLimit ? Date.now() : null,
  };
  go('quiz');
}

/* ════════════════════════════════════════════════
   QUIZ VIEW
   ════════════════════════════════════════════════ */
function renderQuiz() {
  const w = div(null);
  const q = quiz.pool[quiz.index];
  const total = quiz.pool.length;
  const pct = Math.round((quiz.index / total) * 100);

  // Header
  const timerEl = quiz.timeLimit ? el('div', { cls: 'quiz-timer' }, '⏱ ' + formatTime(Math.max(0, quiz.timeLimit - Math.floor((Date.now() - quiz.startTime) / 1000)))) : null;
  w.appendChild(div('quiz-header',
    el('button', { cls: 'btn-ghost', onClick: () => {
      if (quiz.mode === 'assessment' && quiz.index > 0) {
        if (!confirm('Exit? Your answers will be lost.')) return;
      }
      clearQuizTimer();
      savePartialQuizProgress();
      quiz = null; go('home');
    }}, '‹ Back'),
    el('h2', { cls: 'quiz-title-text' }, quiz.title),
    timerEl
  ));
  if (timerEl) startQuizTimer(timerEl);

  // Progress
  w.appendChild(div('progress-bar', el('div', { cls: 'progress-fill', style: `width:${pct}%` })));
  w.appendChild(div('progress-meta',
    el('span', { cls: 'label' }, `${quiz.index + 1} / ${total}`),
    quiz.mode === 'knowledge'
      ? el('span', { cls: 'streak label' }, `✓ ${quiz.correctCount}` + (quiz.streak > 1 ? `  🔥 ${quiz.streak}` : ''))
      : el('span', { cls: 'label' }, `${pct}% through`)
  ));

  // Question jump bar
  const jumpBar = div('q-jump');
  quiz.pool.forEach((pq, i) => {
    const isCurrent  = i === quiz.index;
    const isRevealed = !!quiz.revealed[pq.i];
    const sel        = quiz.answers[pq.i] || [];
    const correctArr = Array.isArray(pq.a) ? pq.a : [pq.a];
    const isCorrect = isRevealed && arrEq(sel, correctArr);
    const isWrong   = isRevealed && !arrEq(sel, correctArr);
    const cls = isCurrent ? 'qj-current' : isCorrect ? 'qj-correct' : isWrong ? 'qj-wrong' : '';
    jumpBar.appendChild(el('button', { cls, onClick: () => { quiz.index = i; go('quiz'); } },
      el('span', null, String(i + 1)),
      isCorrect ? el('span', { cls: 'qj-mark' }, '✓') : isWrong ? el('span', { cls: 'qj-mark' }, '✗') : null
    ));
  });
  w.appendChild(jumpBar);

  // Question card
  const selected = quiz.answers[q.i] || [];
  const revealed = !!quiz.revealed[q.i];
  const correctArr = Array.isArray(q.a) ? q.a : [q.a];

  w.appendChild(div('qcard',
    el('div', { cls: 'qnum' }, `Question ${quiz.index + 1}`),
    el('div', { cls: 'qtext' }, q.q),
    q.m ? el('div', { cls: 'multi-badge' }, 'Select all that apply') : null
  ));

  // Options
  const opts = div('options');
  q.o.forEach((text, oi) => {
    const isSel = selected.includes(oi);
    const isCorrect = correctArr.includes(oi);
    let cls = 'opt';
    if (revealed) {
      cls += ' locked';
      if (isCorrect) cls += ' correct';
      else if (isSel) cls += ' wrong';
      else cls += ' faded';
    } else if (isSel) cls += ' sel';

    opts.appendChild(el('button', { cls, onClick: () => handleOption(q, oi) },
      el('div', { cls: 'opt-letter' }, letter(oi)),
      el('span', null, text)
    ));
  });
  w.appendChild(opts);

  // Feedback (knowledge only)
  if (quiz.mode === 'knowledge' && revealed) {
    const ok = arrEq(selected, correctArr);
    w.appendChild(div('feedback-box ' + (ok ? 'ok' : 'bad'),
      el('div', { cls: 'fb-label' }, ok ? '✓ Correct' : '✗ Not quite'),
      el('div', { cls: 'fb-body' },
        ok ? 'Nice work.' :
          el('span', null, 'Correct: ', el('strong', null, correctArr.map(i => `${letter(i)} — ${q.o[i]}`).join(' / ')))
      )
    ));
  }

  // Nav
  const nav = div('quiz-nav');
  if (quiz.mode === 'knowledge') {
    if (!revealed) {
      nav.appendChild(el('button', {
        cls: 'btn btn-primary', disabled: selected.length === 0,
        onClick: () => submitAnswer(q)
      }, 'Check answer'));
    } else {
      const last = quiz.index === total - 1;
      nav.appendChild(el('button', {
        cls: 'btn btn-primary',
        onClick: () => { if (last) finishQuiz(); else { quiz.index++; go('quiz'); } }
      }, last ? 'Finish' : 'Next →'));
    }
  } else {
    if (quiz.index > 0) {
      nav.appendChild(el('button', { cls: 'btn btn-secondary', onClick: () => { quiz.index--; go('quiz'); } }, '‹ Prev'));
    }
    const last = quiz.index === total - 1;
    nav.appendChild(el('button', {
      cls: 'btn btn-primary',
      onClick: () => { if (last) finishQuiz(); else { quiz.index++; go('quiz'); } }
    }, last ? 'Submit exam' : 'Next ›'));
  }
  w.appendChild(nav);
  return w;
}

function handleOption(q, oi) {
  if (quiz.revealed[q.i]) return;
  const cur = quiz.answers[q.i] || [];
  quiz.answers[q.i] = q.m
    ? (cur.includes(oi) ? cur.filter(x => x !== oi) : [...cur, oi])
    : [oi];
  go('quiz');
}

function savePartialQuizProgress() {
  if (!quiz || quiz.source !== 'topic' || quiz.topicIdx == null) return;
  const answered = Object.keys(quiz.revealed).length;
  if (answered === 0) return; // nothing answered yet
  const user = currentUser();
  const tname = TOPICS[quiz.topicIdx].name;
  user.topicStats = user.topicStats || {};
  user.topicStats[tname] = user.topicStats[tname] || { correctIds: [], wrongIds: [] };
  const stats = user.topicStats[tname];

  // Save actual answers + revealed state so we can fully restore on resume
  const sessionAnswers  = { ...(stats.sessionAnswers  || {}) };
  const sessionRevealed = { ...(stats.sessionRevealed || {}) };
  Object.keys(quiz.revealed).forEach(qiStr => {
    const qi = parseInt(qiStr);
    sessionAnswers[qi]  = quiz.answers[qi] || [];
    sessionRevealed[qi] = true;
  });
  stats.sessionAnswers  = sessionAnswers;
  stats.sessionRevealed = sessionRevealed;
  stats.updatedAt       = Date.now();
  // correctIds/wrongIds were already updated per-question by submitAnswer

  if (!route.shuffle) {
    let firstUnanswered = quiz.pool.findIndex(p => !sessionRevealed[p.i]);
    if (firstUnanswered === -1) firstUnanswered = quiz.pool.length - 1;
    stats.resumeIndex = firstUnanswered;
  } else {
    delete stats.resumeIndex;
    delete stats.sessionAnswers;
    delete stats.sessionRevealed;
  }
  saveStore();
}

function submitAnswer(q) {
  const user = currentUser();
  const sel = quiz.answers[q.i] || [];
  const correctArr = Array.isArray(q.a) ? q.a : [q.a];
  const ok = arrEq(sel, correctArr);
  quiz.revealed[q.i] = true;

  // Always update topic-level stats by q.t (works for topic, review, assessment, etc.)
  recordQuestionResult(user, q, ok);
  // Keep top-level user.wrongIds in sync
  if (ok) {
    quiz.correctCount++; quiz.streak++;
    user.wrongIds = (user.wrongIds || []).filter(id => id !== q.i);
  } else {
    quiz.streak = 0;
    if (!(user.wrongIds || []).includes(q.i)) user.wrongIds = [...(user.wrongIds || []), q.i];
  }
  saveStore();
  go('quiz');
}

function finishQuiz() {
  clearQuizTimer();
  const user = currentUser();
  let correct = 0, wrong = 0, skipped = 0;
  const detail = quiz.pool.map(q => {
    const sel = quiz.answers[q.i] || [];
    const correctArr = Array.isArray(q.a) ? q.a : [q.a];
    const attempted = sel.length > 0;
    const ok = attempted && arrEq(sel, correctArr);
    if (ok) {
      correct++;
      recordQuestionResult(user, q, true);
      user.wrongIds = (user.wrongIds || []).filter(id => id !== q.i);
    } else if (attempted) {
      wrong++;
      recordQuestionResult(user, q, false);
      if (!(user.wrongIds || []).includes(q.i)) user.wrongIds = [...(user.wrongIds || []), q.i];
    } else {
      skipped++; // leave existing state alone
    }
    return { q, sel, ok, correctArr, attempted };
  });

  if (quiz.source === 'topic' && quiz.topicIdx != null) {
    const tname = TOPICS[quiz.topicIdx].name;
    const stats = (user.topicStats || {})[tname];
    if (stats) {
      delete stats.resumeIndex;
      delete stats.sessionAnswers;
      delete stats.sessionRevealed;
      stats.updatedAt = Date.now();
    }
  }
  saveStore();
  quiz.results = { correct, wrong, skipped, total: quiz.pool.length, detail };
  go('results');
}

/* ════════════════════════════════════════════════
   RESULTS VIEW
   ════════════════════════════════════════════════ */
function renderResults() {
  const r = quiz.results;
  const wrongCount   = r.wrong   != null ? r.wrong   : r.detail.filter(d => d.attempted && !d.ok).length;
  const skippedCount = r.skipped != null ? r.skipped : r.detail.filter(d => !d.attempted).length;
  const pct = Math.round((r.correct / r.total) * 100);
  const passed = pct >= 70;
  const missed  = r.detail.filter(d => d.attempted && !d.ok);
  const skipped = r.detail.filter(d => !d.attempted);
  const reviewable = [...missed, ...skipped];
  const w = div(null);

  w.appendChild(div('quiz-header',
    el('button', { cls: 'btn-ghost', onClick: () => { quiz = null; go('home'); } }, '‹ Home'),
    el('h2', { cls: 'quiz-title-text' }, 'Results')
  ));

  w.appendChild(div('results-hero',
    el('div', { cls: 'label', style: 'margin-bottom:8px' }, quiz.title),
    el('div', { cls: 'big-score' }, String(r.correct), el('span', { cls: 'denom' }, ` / ${r.total}`)),
    el('div', { cls: 'big-pct ' + (passed ? 'pass' : 'fail') }, `${pct}%  ${passed ? '✓ Pass' : '✗ Keep studying'}`),
    el('div', { style: 'margin-top:10px;font-size:13px;color:var(--dim);' },
      el('span', { style: 'color:var(--green);' }, `✓ ${r.correct} correct`),
      '  ·  ',
      el('span', { style: 'color:var(--red);' }, `✗ ${wrongCount} wrong`),
      skippedCount > 0 ? el('span', null, '  ·  ', el('span', { style: 'color:var(--faint);' }, `○ ${skippedCount} skipped`)) : null
    )
  ));

  const ar = div('action-row');
  ar.appendChild(el('button', { cls: 'btn btn-secondary', onClick: () => { quiz = null; go('home'); } }, '↩ Home'));
  if (reviewable.length > 0) {
    ar.appendChild(el('button', {
      cls: 'btn btn-primary',
      onClick: () => {
        quiz = { mode: 'knowledge', source: 'review', title: 'Review missed',
          pool: shuffle(reviewable.map(d => d.q)), index: 0, answers: {}, revealed: {}, streak: 0, correctCount: 0 };
        go('quiz');
      }
    }, `✎ Review ${reviewable.length}`));
  }
  w.appendChild(ar);

  if (missed.length > 0) {
    w.appendChild(el('div', { cls: 'label section-label' }, `Wrong (${missed.length})`));
    missed.forEach(d => {
      const correctText = d.correctArr.map(i => letter(i)).join(', ');
      const userText = d.sel.length ? d.sel.map(i => letter(i)).join(', ') : '—';
      w.appendChild(div('result-row bad',
        el('div', { cls: 'result-q' }, d.q.q),
        el('div', { cls: 'result-ans' },
          'You: ', el('span', { cls: 'wrong-ans' }, userText), '  ·  ',
          'Answer: ', el('span', { cls: 'correct-ans' }, correctText + ' — ' + d.q.o[d.correctArr[0]].slice(0, 70))
        )
      ));
    });
  }

  if (skipped.length > 0) {
    w.appendChild(el('div', { cls: 'label section-label' }, `Skipped (${skipped.length})`));
    skipped.forEach(d => {
      const correctText = d.correctArr.map(i => letter(i)).join(', ');
      w.appendChild(div('result-row',
        el('div', { cls: 'result-q' }, d.q.q),
        el('div', { cls: 'result-ans' },
          'Answer: ', el('span', { cls: 'correct-ans' }, correctText + ' — ' + d.q.o[d.correctArr[0]].slice(0, 70))
        )
      ));
    });
  }

  if (missed.length === 0 && skipped.length === 0) {
    w.appendChild(div('empty', el('h3', null, '✓ Perfect score'), el('p', null, 'You got every single one right.')));
  }

  return w;
}

/* ════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════ */
render();
</script>
